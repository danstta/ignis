name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
        env:
          # Env access is lazy (lib/env.ts) — these dummies just keep any
          # build-time code paths from throwing without a real database.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          SESSION_SECRET: ci-dummy-session-secret
